name: service-ml-forecast

services:
  service-ml-forecast:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ml-forecast
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # These override .env values with Docker-internal hostnames
      - ML_OR_URL=https://energy-forecasting-dataset-proxy-1
      - ML_OR_KEYCLOAK_URL=https://energy-forecasting-dataset-proxy-1/auth
      - ML_OR_SERVICE_URL=https://localhost
      - ML_OR_PUBLIC_URL=https://localhost
      - ML_OR_PUBLIC_KEYCLOAK_URL=https://localhost/auth
      - ML_VERIFY_SSL=false
      - ML_API_MIDDLEWARE_KEYCLOAK=false
      - ML_WEBSERVER_ORIGINS=["https://localhost"]
      - ML_OR_REALM=master
      - ML_LOG_LEVEL=${ML_LOG_LEVEL:-INFO}
    volumes:
      # Model storage
      - ../deployment/data/models:/app/deployment/data/models
      # Config storage
      - ../deployment/data/configs:/app/deployment/data/configs
    restart: unless-stopped
    networks:
      - ml-network
      - openremote-network

networks:
  ml-network:
    driver: bridge
  openremote-network:
    external: true
    name: energy-forecasting-dataset_default
